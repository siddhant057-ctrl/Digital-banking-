<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>💰 MAONY PANEL · HACKING STYLE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Share Tech Mono', 'Fira Code', 'Courier New', monospace;
    }

    /* cyberpunk / hacking core — animated matrix rain influence */
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #021007, #000000);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* glitchy scanlines + flicker */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0, 255, 0, 0.03) 0px, rgba(0, 255, 0, 0.03) 2px, transparent 2px, transparent 6px);
      pointer-events: none;
      z-index: 1;
      animation: scanMove 12s linear infinite;
    }

    @keyframes scanMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 20px; }
    }

    /* glitch overlay */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(0,255,0,0.08), transparent);
      pointer-events: none;
      z-index: 1;
    }

    /* === MAIN TERMINAL PANEL === */
    .hacking-terminal {
      background: #0a0f0ad9;
      backdrop-filter: blur(16px);
      border: 2px solid #2effb0;
      border-radius: 1.2rem;
      width: 100%;
      max-width: 560px;
      padding: 1.8rem 2rem 2rem;
      box-shadow: 0 0 18px rgba(0, 255, 100, 0.3), inset 0 0 12px rgba(0, 255, 150, 0.1);
      position: relative;
      z-index: 10;
      transition: 0.2s;
      animation: terminalGlow 3s infinite alternate;
    }

    @keyframes terminalGlow {
      0% { border-color: #2effb0; box-shadow: 0 0 10px rgba(46,255,176,0.3);}
      100% { border-color: #00ffcc; box-shadow: 0 0 25px rgba(0,255,200,0.7);}
    }

    /* header cash style */
    .cash-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 2px dashed #2aff9e;
      margin-bottom: 1.5rem;
      padding-bottom: 0.7rem;
      flex-wrap: wrap;
    }
    .cash-header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e5ff00, #0effa0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: 3px;
      text-shadow: 0 0 5px #00ff77;
      font-family: monospace;
    }
    .badge-hack {
      background: #000000aa;
      border: 1px solid #3eff9e;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      font-size: 0.7rem;
      color: #aaffcc;
      letter-spacing: 1px;
    }

    /* ===== HACKING STYLE INPUTS ===== */
    .hack-field {
      margin-bottom: 1.3rem;
      text-align: left;
    }
    .hack-field label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #a0ffb0;
      letter-spacing: 1.5px;
      margin-bottom: 0.5rem;
      font-weight: bold;
      text-shadow: 0 0 2px #0f0;
    }
    .hack-input {
      width: 100%;
      background: #010a02;
      border: 1px solid #2effa0;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
      font-family: monospace;
      color: #c0ffd0;
      outline: none;
      transition: all 0.15s;
      box-shadow: inset 0 0 5px rgba(0,255,0,0.2);
    }
    .hack-input:focus {
      border-color: #f0ff70;
      box-shadow: 0 0 8px #2eff9e, inset 0 0 4px #aaffaa;
      background: #021c05;
      color: #ffffff;
    }
    .hack-input::placeholder {
      color: #3b7c55;
      font-style: italic;
    }

    /* live location block — elite style */
    .location-panel {
      background: #031007cc;
      border: 1px solid #47ff9e;
      border-radius: 16px;
      padding: 0.8rem 1rem;
      margin: 1.2rem 0 1rem;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }
    .loc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .loc-header span {
      font-weight: bold;
      color: #aaffcc;
      font-size: 0.75rem;
      background: #00000066;
      padding: 2px 8px;
      border-radius: 30px;
    }
    .glitch-btn {
      background: #000000;
      border: 1px solid #2effb0;
      color: #00ffaa;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s linear;
      font-family: monospace;
    }
    .glitch-btn:hover {
      background: #2effb033;
      box-shadow: 0 0 6px #2effa0;
      text-shadow: 0 0 2px #0f0;
      transform: scale(0.98);
    }
    .loc-data {
      font-family: monospace;
      font-size: 0.7rem;
      background: #021a07;
      padding: 8px;
      border-radius: 10px;
      margin-top: 8px;
      word-break: break-all;
      color: #94ffb0;
      border-left: 3px solid #0eff80;
    }

    /* hacker-style name fields with typing effect */
    .hacker-name-row {
      display: flex;
      gap: 14px;
      margin-bottom: 1rem;
    }
    .hacker-name-row .hack-field {
      flex: 1;
    }

    /* buttons */
    .hack-primary-btn {
      width: 100%;
      background: linear-gradient(90deg, #0e2b1a, #051f0c);
      border: 1.5px solid #25ffa0;
      padding: 0.9rem;
      font-weight: bold;
      color: #aaffcc;
      font-family: monospace;
      letter-spacing: 2px;
      font-size: 1rem;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
      text-transform: uppercase;
    }
    .hack-primary-btn:hover {
      background: #0b3c1f;
      border-color: #f5ff88;
      color: #e0ffc0;
      box-shadow: 0 0 12px #1eff8f;
    }
    .otp-gizmo {
      margin-top: 1.2rem;
      padding-top: 0.8rem;
      border-top: 1px dashed #2effb0;
    }
    .flex-otp {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .flex-otp .hack-input {
      flex: 2;
    }
    .hidden {
      display: none;
    }

    /* toast hacking notifications */
    .hack-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: #021f0b;
      border: 1px solid #50ffa0;
      backdrop-filter: blur(12px);
      color: #b0ffc0;
      padding: 0.7rem 1.5rem;
      font-family: monospace;
      font-size: 0.8rem;
      border-radius: 40px;
      z-index: 999;
      opacity: 0;
      transition: 0.15s;
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: 1px;
    }
    .toast-active {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }
    .error-glow {
      animation: glitchShake 0.25s ease-in-out 0s 2;
      border-color: #ff3570 !important;
      box-shadow: 0 0 6px #ff3366 !important;
    }
    @keyframes glitchShake {
      0% { transform: translateX(0px);}
      25% { transform: translateX(-4px);}
      75% { transform: translateX(3px);}
      100% { transform: translateX(0);}
    }
    .footnote {
      font-size: 0.55rem;
      text-align: center;
      margin-top: 1rem;
      color: #4c8b6e;
      font-family: monospace;
    }

    @media (max-width: 500px) {
      .hacking-terminal { padding: 1.2rem; }
      .hacker-name-row { flex-direction: column; gap: 0; }
      .cash-header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="hacking-terminal">
  <div class="cash-header">
    <h1>💰 MAONY 💰</h1>
    <div class="badge-hack">// ROOT_ACCESS //</div>
  </div>

  <!-- HACKER NAME BOXES (PURE HACKING STYLE) -->
  <div class="hacker-name-row">
    <div class="hack-field">
      <label>🔻 [ALIAS] HANDLE</label>
      <input type="text" id="hackerAlias" class="hack-input" placeholder="gh0st_maony" autocomplete="off">
    </div>
    <div class="hack-field">
      <label>⚡ CODENAME</label>
      <input type="text" id="codename" class="hack-input" placeholder="crypt0_wolf" autocomplete="off">
    </div>
  </div>

  <!-- MOBILE + WHATSAPP (pure hack) -->
  <div class="hacker-name-row">
    <div class="hack-field">
      <label>📡 TARGET MOBILE</label>
      <input type="tel" id="mobile" class="hack-input" placeholder="10 digit" maxlength="10" inputmode="numeric">
    </div>
    <div class="hack-field">
      <label>📲 WA BURNER</label>
      <input type="tel" id="whatsapp" class="hack-input" placeholder="same/diff" maxlength="10" inputmode="numeric">
    </div>
  </div>

  <!-- LIVE LOCATION ACCESS (replaces Aadhaar) -->
  <div class="location-panel" id="locationPanel">
    <div class="loc-header">
      <span>🌍 LIVE GEOLOCATION (spoof-proof)</span>
      <button id="requestLocationBtn" class="glitch-btn">⚡ ACCESS LOCATION ⚡</button>
    </div>
    <div class="loc-data" id="locationDataDisplay">
      ❌ Location not granted | click to inject coordinates
    </div>
    <div id="locHint" style="font-size:0.6rem; color:#3e9a6e; margin-top:6px;">🔒 encrypted: GPS + network fallback</div>
  </div>

  <!-- PASSWORD + CONFIRM (hashing style) -->
  <div class="hacker-name-row">
    <div class="hack-field">
      <label>🗝️ ENCRYPT KEY</label>
      <input type="password" id="password" class="hack-input" placeholder="min 6 chars">
    </div>
    <div class="hack-field">
      <label>✓ VERIFY KEY</label>
      <input type="password" id="confirmPwd" class="hack-input" placeholder="retry">
    </div>
  </div>

  <!-- Main ACTION: GENERATE OTP / MAONY SESSION -->
  <button id="generateSessionBtn" class="hack-primary-btn">⚡ INITIATE MAONY SESSION ⚡</button>

  <!-- OTP Section : hacking style -->
  <div id="otpPanel" class="otp-gizmo hidden">
    <div class="hack-field">
      <label>🔐 ENTER 6‑DIGIT VERIFICATION TOKEN</label>
      <div class="flex-otp">
        <input type="text" id="otpCode" class="hack-input" placeholder="******" maxlength="6" inputmode="numeric">
        <button id="verifyTokenBtn" class="glitch-btn" style="padding: 0.7rem 1rem;">DECRYPT ✓</button>
      </div>
    </div>
    <div class="loc-data" id="otpHintMsg" style="font-size:0.65rem; margin-top:5px;">
      💀 DEMO OTP will be shown as toast (simulated secure channel)
    </div>
  </div>

  <div class="footnote">
    🧬 [ MAONY PANEL v2.0 ] — location encrypted + hacker alias + $$ access
  </div>
</div>

<div id="hackToast" class="hack-toast">🟢 system ready</div>

<script>
  (function(){
    // DOM elements
    const aliasInput = document.getElementById('hackerAlias');
    const codenameInput = document.getElementById('codename');
    const mobileInput = document.getElementById('mobile');
    const whatsappInput = document.getElementById('whatsapp');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPwd');
    const genSessionBtn = document.getElementById('generateSessionBtn');
    const otpPanel = document.getElementById('otpPanel');
    const otpCodeInput = document.getElementById('otpCode');
    const verifyBtn = document.getElementById('verifyTokenBtn');
    const locationBtn = document.getElementById('requestLocationBtn');
    const locationDisplay = document.getElementById('locationDataDisplay');

    // toast system
    const toastEl = document.getElementById('hackToast');
    function showToast(msg, isError = false) {
      toastEl.textContent = msg;
      toastEl.style.background = isError ? '#2a0d12' : '#031f0c';
      toastEl.style.borderColor = isError ? '#ff5f8f' : '#6effb0';
      toastEl.classList.add('toast-active');
      setTimeout(() => toastEl.classList.remove('toast-active'), 2800);
    }

    function errorShake(inputElement, message) {
      showToast(message, true);
      inputElement.classList.add('error-glow');
      setTimeout(() => inputElement.classList.remove('error-glow'), 500);
    }

    // ---------- LIVE LOCATION API (full modern access) ----------
    let currentLocation = null;   // store {lat, lng, accuracy}
    function requestLiveLocation() {
      if (!navigator.geolocation) {
        locationDisplay.innerHTML = "⚠️ GEOLOCATION UNAVAILABLE — browser not supported";
        showToast("❌ Geolocation API missing", true);
        return;
      }
      locationDisplay.innerHTML = "📡 requesting GPS fix ... (allow permission)";
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const acc = position.coords.accuracy;
          currentLocation = { lat, lng, accuracy: acc };
          const time = new Date().toLocaleTimeString();
          locationDisplay.innerHTML = `📍 LIVE COORDINATES: ${lat.toFixed(6)} , ${lng.toFixed(6)}<br>🎯 Accuracy: ±${Math.round(acc)}m  |  ${time}<br>🔓 [MAONY GEOTRACK]`;
          showToast(`🌎 Location captured: ${lat.toFixed(4)},${lng.toFixed(4)}`, false);
        },
        (error) => {
          let errMsg = "Location error: ";
          switch(error.code) {
            case error.PERMISSION_DENIED: errMsg += "permission denied by target"; break;
            case error.POSITION_UNAVAILABLE: errMsg += "signal lost"; break;
            case error.TIMEOUT: errMsg += "timeout"; break;
            default: errMsg += "unknown";
          }
          locationDisplay.innerHTML = `⛔ ${errMsg} — use mock? retry manually`;
          showToast(`❌ ${errMsg}`, true);
          currentLocation = null;
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
      );
    }

    locationBtn.addEventListener('click', () => {
      requestLiveLocation();
    });

    // helper to validate fields before OTP (includes hacker name style)
    function validateHackCredentials() {
      let alias = aliasInput.value.trim();
      let code = codenameInput.value.trim();
      if(alias.length < 2) {
        errorShake(aliasInput, "⚠️ ALIAS / HANDLE required (min 2 chars)");
        return null;
      }
      if(code.length < 2) {
        errorShake(codenameInput, "⚠️ CODENAME required (elite handle)");
        return null;
      }
      const mobile = mobileInput.value.trim();
      if(!/^\d{10}$/.test(mobile)) {
        errorShake(mobileInput, "📞 Mobile must be exactly 10 digits");
        return null;
      }
      let whatsapp = whatsappInput.value.trim();
      if(whatsapp === "") whatsapp = mobile;
      else if(!/^\d{10}$/.test(whatsapp)) {
        errorShake(whatsappInput, "💬 WhatsApp number invalid (10 digits)");
        return null;
      }
      // Location must be granted (MAONY style requirement)
      if(!currentLocation) {
        showToast("⚠️ You must grant LIVE LOCATION access before proceeding", true);
        locationDisplay.style.border = "1px solid #ff5f7e";
        setTimeout(() => locationDisplay.style.border = "", 1000);
        return null;
      }
      const pwd = passwordInput.value;
      if(pwd.length < 6) {
        errorShake(passwordInput, "🔐 Encryption key must be >=6 characters");
        return null;
      }
      if(pwd !== confirmInput.value) {
        errorShake(confirmInput, "❌ Keys do not match");
        return null;
      }
      return {
        alias, codename: code, mobile, whatsapp, password: pwd,
        location: { lat: currentLocation.lat, lng: currentLocation.lng, accuracy: currentLocation.accuracy }
      };
    }

    let generatedOTP = null;
    let pendingSession = null;

    // generate OTP
    function generateOtp() { return Math.floor(100000 + Math.random() * 900000).toString(); }

    // main session init (send OTP)
    function initMaonySession() {
      const validData = validateHackCredentials();
      if(!validData) return false;

      pendingSession = validData;
      generatedOTP = generateOtp();

      // show OTP panel with hacking vibe
      otpPanel.classList.remove('hidden');
      const hintSpan = document.getElementById('otpHintMsg');
      if(hintSpan) {
        hintSpan.innerHTML = `💀 [SECURE CHANNEL] One-time token: <span style="color:#aaffaa; font-weight:bold;">${generatedOTP}</span> — inject below to finalize MAONY access.`;
      }
      showToast(`🔓 MAONY OTP >> ${generatedOTP} << (demo injection)`, false);
      otpCodeInput.value = '';
      otpCodeInput.focus();
      return true;
    }

    // finalize registration (hacker style + localStorage with maony payload)
    function finalizeMaonyRegistration() {
      if(!generatedOTP) {
        showToast("💀 No active session, click 'INITIATE MAONY SESSION' first.", true);
        return;
      }
      const userOtp = otpCodeInput.value.trim();
      if(!/^\d{6}$/.test(userOtp)) {
        errorShake(otpCodeInput, "❌ Invalid 6-digit token");
        return;
      }
      if(userOtp !== generatedOTP) {
        errorShake(otpCodeInput, "⛔ Token mismatch! access denied.");
        return;
      }
      if(!pendingSession) {
        showToast("Session expired, please re-initiate", true);
        return;
      }

      // duplicate check on mobile (Maony DB)
      const existingKey = `maony_user_${pendingSession.mobile}`;
      if(localStorage.getItem(existingKey)) {
        showToast("⚠️ TARGET mobile already registered in MAONY network. Use login.", true);
        return;
      }

      // construct hacker profile + location saved
      const maonyProfile = {
        handle: pendingSession.alias,
        codename: pendingSession.codename,
        mobile: pendingSession.mobile,
        whatsapp: pendingSession.whatsapp,
        password: pendingSession.password,
        locationSnapshot: {
          lat: pendingSession.location.lat,
          lng: pendingSession.location.lng,
          accuracy: pendingSession.location.accuracy,
          capturedAt: new Date().toISOString()
        },
        registeredAt: new Date().toISOString(),
        maonyBalance: "💸 0.00 MAONY",
        accessLevel: "HACKER_ELITE"
      };

      localStorage.setItem(existingKey, JSON.stringify(maonyProfile));
      showToast(`💰 MAONY ACCESSION SUCCESSFUL | WELCOME ${pendingSession.alias} | redirecting to login...`, false);

      setTimeout(() => {
        // simulate redirect to login page (but we create dynamic fallback message)
        window.location.href = "login.html";
      }, 1600);
    }

    // event binding
    genSessionBtn.addEventListener('click', (e) => {
      e.preventDefault();
      initMaonySession();
    });

    verifyBtn.addEventListener('click', (e) => {
      e.preventDefault();
      finalizeMaonyRegistration();
    });

    // Resend ability inside otp hint panel
    function resendOtpHandler() {
      if(!pendingSession) {
        const data = validateHackCredentials();
        if(!data) return;
        pendingSession = data;
      }
      generatedOTP = generateOtp();
      const hintDiv = document.getElementById('otpHintMsg');
      if(hintDiv) hintDiv.innerHTML = `🔄 RESENT TOKEN: <span style="color:#aaffaa;">${generatedOTP}</span> — use immediately.`;
      showToast(`🔄 New MAONY OTP: ${generatedOTP}`, false);
      otpCodeInput.value = '';
      otpCodeInput.focus();
    }

  // add resend button inside OTP area
    const otpHintDiv = document.getElementById('otpHintMsg');
    if(otpHintDiv && !document.getElementById('resendMaonyBtn')) {
      const resendBtn = document.createElement('button');
      resendBtn.id = 'resendMaonyBtn';
      resendBtn.textContent = '⟳ RESEND TOKEN';
      resendBtn.className = 'glitch-btn';
      resendBtn.style.marginLeft = '10px';
      resendBtn.style.fontSize = '0.65rem';
      resendBtn.style.padding = '4px 10px';
      resendBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if(!pendingSession && (aliasInput.value.trim() === "" || mobileInput.value.trim() === "")) {
          showToast("Fill credentials before resend OTP", true);
          return;
        }
        if(!pendingSession) {
          const valid = validateHackCredentials();
          if(!valid) return;
          pendingSession = valid;
        }
        resendOtpHandler();
      });
      otpHintDiv.appendChild(document.createElement('br'));
      otpHintDiv.appendChild(resendBtn);
    }

    // Input sanitizers (numeric only for mobile/whatsapp)
    mobileInput.addEventListener('input', (e) => { e.target.value = e.target.value.replace(/\D/g,'').slice(0,10); });
    whatsappInput.addEventListener('input', (e) => { e.target.value = e.target.value.replace(/\D/g,'').slice(0,10); });
    otpCodeInput.addEventListener('input', (e) => { e.target.value = e.target.value.replace(/\D/g,'').slice(0,6); });

    // additional glitch: if user tries to modify fields after otp visible, we reset session but not annoying
    function resetSessionIfChanged() {
      if(!otpPanel.classList.contains('hidden')) {
        generatedOTP = null;
        pendingSession = null;
        otpPanel.classList.add('hidden');
        showToast("🔄 Credentials changed — session reset, re-initiate", false);
      }
    }
    aliasInput.addEventListener('input', resetSessionIfChanged);
    codenameInput.addEventListener('input', resetSessionIfChanged);
    mobileInput.addEventListener('input', resetSessionIfChanged);
    whatsappInput.addEventListener('input', resetSessionIfChanged);
    passwordInput.addEventListener('input', resetSessionIfChanged);
    confirmInput.addEventListener('input', resetSessionIfChanged);
    // location change detection? we reset session if location changes after OTP panel open? but fine.
    // also add location refresh resets?
    const originalLocReq = requestLiveLocation;
    // Override just to add extra: but not needed fully.

    // check default welcome message
    showToast("💰 MAONY PANEL ACTIVE — get location & inject alias", false);
    // optional: pre-fill styling
  })();
</script>
</body>
</html>
